# Variant C — two plugins + customer_b site profile (multi-plugin registration,
# most-severe-wins aggregation, site swap without touching plugin code).
schema_version: run_manifest.v1
run_id: xer6_live_matrix_c_multi
boxes:
  l4_bridge:
    enabled: true
    profile: x_er_commander
  l3_validator:
    enabled: true
    profile: x_lite_default
    plugins:
      - id: l3.zone_policy
        version: 0.1.0
        profile: customer_b
      - id: l3.confidence_policy
        version: 0.1.0
        profile: customer_b
  l2_governance:
    enabled: true
    profile: mini_warehouse_default
expected_emitters:
  - l4_bridge
  - l3_validator
  - l2_governance
score_specs:
  - result
