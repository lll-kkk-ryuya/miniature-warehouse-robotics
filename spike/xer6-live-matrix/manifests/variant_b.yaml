run_id: xer6_live_matrix_b_zone
boxes:
  l4_bridge:
    enabled: true
    profile: x_er_commander
  l3_validator:
    enabled: true
    profile: x_lite_default
    plugins:
      - id: l3.zone_policy
        version: 0.1.0
        profile: customer_a
  l2_governance:
    enabled: true
    profile: mini_warehouse_default
