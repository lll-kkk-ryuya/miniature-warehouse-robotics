# Pre-commit hooks: run lint/format and safety checks before each commit.
# Setup (once per clone/worktree):  pip install pre-commit && pre-commit install
# Manual run on all files:          pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff            # lint (autofix)
        args: [--fix]
      - id: ruff-format     # format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key   # safety.md: never commit credentials/keys
