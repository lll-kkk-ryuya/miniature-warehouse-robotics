# Pre-commit hooks: run lint/format and safety checks before each commit.
# Setup (once per clone/worktree):  pip install pre-commit && pre-commit install
# Manual run on all files:          pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff            # lint (autofix)
        args: [--fix]
      - id: ruff-format     # format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key   # safety.md: never commit credentials/keys

  # 並列マージ/エディタが作る複製残骸 "X 2.md" / "Y 2.py" を機械的に拒否
  # (parallel-workflow.md §6 / docs/dev 03-retrospectives L5)。本ガードは pre-commit のみ
  # （CI ci.yml には未配線。CI 側の保険が要るなら dev-tooling でステップ追加）。
  - repo: local
    hooks:
      - id: forbid-duplicate-copies
        name: forbid duplicate "X 2.ext" files
        entry: 'duplicate-copy file detected (e.g. "README 2.md"). Rename or remove it.'
        language: fail
        files: ' [0-9]+\.[A-Za-z0-9]+$'
