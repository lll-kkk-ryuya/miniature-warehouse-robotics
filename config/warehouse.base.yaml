# 全環境共通のデフォルト（唯一の真実の土台）。環境差分は config/<env>/warehouse.yaml で上書き。
# スキーマの正本: docs/architecture/13-hermes-setup.md §3.3 / docs/architecture/08-llm-bridge-common.md
# 解決順: このファイル → config/$WAREHOUSE_ENV/warehouse.yaml → 環境変数（後勝ち）

# 交通管理モード（none=Mode A / simple=Mode B / open-rmf=Mode C）。既定は env 側で上書き
traffic_mode: none

# ロボット構成（namespace は /bot1 /bot2）
robots:
  - id: bot1
  - id: bot2

# 速度・安全（ミニチュアスケール。Layer0/1 で強制。.claude/rules/safety.md）
safety:
  max_linear_velocity: 0.3   # m/s 上限（厳守）
  emergency_min_distance: 0.3   # m（2台間。doc12 DISTANCE_THRESHOLD と一致。TODO: Phase 2 実測で確定）
  blocked_timeout: 10.0   # s, Nav2 recovery trigger（doc12 BLOCKED_TIMEOUT）。TODO: Phase 2 実測で確定
  # #126 freshness guard: amcl_pose 途絶（localization ロスト）→ precautionary estop の鮮度窓。
  # 既定 1.0s は R-39（doc07:249）の AMCL 5-10Hz=100-200ms 正常間隔の ~5×（正常 cadence で誤発火しない）。
  # 正本 = doc12 §「Emergency Guardian — pose freshness guard」。TODO: Phase 2 実機 AMCL レートで確定。
  pose_freshness_timeout: 1.0   # s
  # #44: BatteryState.percentage の driver スケール。percent=0..100 / fraction=0..1(REP-147)。
  # 既定 percent は fail-safe（fraction ドライバを percent と読むと誤 estop=安全側、見逃しは起きない）。
  # State Cache・Emergency Guardian が共有 helper(warehouse_interfaces.safety.normalize_battery_percent)
  # で正規化。TODO: Phase 1 で実機 Yahboom ドライバの実スケールを計測し確定（safety.md / doc16 §11 estop テスト）。
  battery_percentage_scale: percent

# LLM サイクル長（総サイクル＝秒）。Mode A=3 / Mode C=5（doc03 / doc08:125-128 総サイクル長列 / README:88-91）。
# scheduler が「応答後アイドル待機 = 総サイクル − 応答(~2s, doc08:125)」に変換して使う
# （warehouse_llm_bridge.scheduler.resolve_cycle_wait。fail-open: 欠落/不正/非正は code 既定 1.0/3.0s へ縮退）。
# レスポンス駆動: 実サイクル ≈ 待機 + 応答(≤2.5s) で固定間隔ポーリングではない（doc08:121）。
# 環境で上書き可（dev は演出のため Mode A を延長＝config/dev/warehouse.yaml）。
cycle:
  mode_a_seconds: 3   # Mode A/B (none/simple): 反応優先 → 待機 ~1s（doc08:127）
  mode_c_seconds: 5   # Mode C (open-rmf): コスト最小 → 待機 ~3s（doc08:128）

# 倉庫レイアウト上の地点キー。キーは 08-llm-bridge-common.md の LOCATIONS と完全一致させる
# （Policy Gate の known_locations 検証用）。座標は暫定値（Phase 2 地図確定後に実測で確定）。
locations:
  shelf_1: {x: 0.2, y: 0.3}
  shelf_2: {x: 0.7, y: 0.3}
  shelf_3: {x: 1.2, y: 0.3}
  berth_A: {x: 0.2, y: 0.8}
  berth_B: {x: 0.7, y: 0.8}
  shipping_station: {x: 0.2, y: 0.1}
  charging_station: {x: 1.2, y: 0.1}   # 2台共有・先着順
  retreat_A: {x: 0.45, y: 0.85}        # 通路A yield 退避先（doc08 LOCATIONS と一致）
  retreat_B: {x: 0.95, y: 0.85}        # 通路B yield 退避先

# Hermes Gateway 接続先（環境別に上書き必須）
hermes:
  base_url: ""   # 環境側で設定
  # token は secrets（config/<env>/.env）から注入
  # 司令官 system prompt の取得元（doc08 §Langfuse Prompt Management 方針）。
  # source: langfuse = Langfuse Prompt Management から取得（取得失敗時はコード定数へ
  #   fail-open 縮退, doc08:333）/ code = コード定数のみ（Langfuse 不使用・CI/完全 offline 用）。
  # label は比較 run で版を pin（公平性, doc08 §比較検証ログ）。実送信単位 2本（mode_ab=base+rules
  # 合成 / mode_c=standalone）。本文の正本は doc08a/08c の例示、seed は seed_prompts が upsert。
  # 取得は起動時1回→HermesClient 保持。版更新の反映はノード再起動（cache_ttl_seconds は
  # 単発取得時の SDK キャッシュTTL＝起動1回取得のため runtime 再取得トリガにはならない）。
  prompts:
    source: langfuse
    label: production
    cache_ttl_seconds: 300
    names:
      mode_ab: warehouse-commander-mode-ab
      mode_c: warehouse-commander-mode-c

# Mode X-ER L4 Robotics Bridge（bridge-local・warehouse_interfaces に入れない・doc06 §5 補遺:269）。
# ER 音声レグの transport 選択（direct ⇔ hermes）を config から解決する（robotics/transport.py
# resolve_audio_transport）。既定は両キー OFF＝音声は direct（恒久 fallback・PR #355 / doc06 §5 補遺:269）。
# base_url 空 or audio_input_audio_supported:false のいずれかで DIRECT に fail-safe。両方満たすときだけ
# HERMES（forked input_audio gateway 経由）。TRANSPORT-FLIP-PLAN §2.1 / §3.1。実 live transport（#344）は
# 別・未実装で本サブツリーは選択のみ（Transport は observation-only 監査タグ・doc03:75）。
# base_url / capability flag は環境側 overlay（config/<env>/warehouse.yaml）で設定・base は env 非依存で OFF。
# gateway bearer は secrets（config/<env>/.env・~/.hermes-mwr-er-lean/.env の API_SERVER_KEY）＝never commit。
robotics:
  er_gateway:
    base_url: ""                        # forked lean ER gateway（例 http://127.0.0.1:8644）。空=direct
    audio_input_audio_supported: false  # fork capability flag: 0001-input_audio-passthrough.patch 適用
                                        # gateway でのみ true。unforked Hermes=false（400・doc06 §5:159）

# Nav2 Bridge（Mode A/B 実行先。ポートは doc13/12a と一致）
nav2_bridge:
  base_url: "http://localhost:8645"

# Open-RMF（Mode C。dev では無効が既定）
rmf:
  enabled: false

# Web Observability gateway（observe-only・doc22 §16:345）。SPA も同一オリジン :8646 配信。
# host / allowed_origins / recordings_dir / static_dir は環境差分ゆえ config/<env>/ overlay で
# 指定（base は共通の port / snapshot_hz のみ）。secret(WEB_BRIDGE_TOKEN) は config/<env>/.env。
web_bridge:
  port: 8646          # §17 port registry（Hermes 8642 / Nav2 8645 / rmf-web 8000 と非衝突）
  snapshot_hz: 2      # /state_cache/snapshot 10Hz → coalesce 配信（doc22 §8:206）
