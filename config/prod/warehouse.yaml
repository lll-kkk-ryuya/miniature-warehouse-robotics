# prod 環境差分（Jetson 実機 + 実ロボット2台 / 本番 GCP Hermes）。本番デモ撮影用。
# ⚠️ 使用前に Emergency Guardian / 速度上限 0.3m/s のテスト通過が必須（.claude/rules/safety.md）。
# 接続先 secrets は config/prod/.env（gitignore。本番キーをコミットしない）。

runtime:
  use_simulation: false       # 実機
  runtime_dir: /run/warehouse # systemd RuntimeDirectory=warehouse

hermes:
  base_url: "http://34.4.104.112:8642"   # 本番 GCP Hermes Gateway

# 本番は Open-RMF（Mode C）を主方針とする
traffic_mode: open-rmf
rmf:
  enabled: true

# Web 観測 gateway（prod）: recordings_dir は #187 段階2 実測後に Jetson SSD path を確定する
# （doc22:379 / S6）。未設定の間は fail-open default /tmp/warehouse/recordings に落ちる。tmpfs の
# runtime_dir（/run/warehouse）は流用禁止（無制限 append が RAM を食い #187 を悪化・doc22:216,:220）。
# web_bridge:
#   recordings_dir: /opt/warehouse/recordings   # TODO(#187/S6): 実測後に確定（SSD・非 tmpfs）
#   host: "127.0.0.1"                            # LAN 公開は S5（token 必須・doc22:254）
