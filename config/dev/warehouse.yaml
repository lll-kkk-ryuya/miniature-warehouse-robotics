# dev 環境差分（Mac Docker / Gazebo sim）。base を上書きする差分のみ記述。
# 接続先 secrets は config/dev/.env（gitignore）。

# 開発は sim 上で実機を使わない
runtime:
  use_simulation: true        # Gazebo Harmonic
  runtime_dir: /tmp/warehouse

hermes:
  base_url: "http://localhost:8642"   # ローカル or dev Gateway（doc13: Gateway port 8642）
  # Memory/Skills 公平性 intent（#103、doc13 §「OFF 機構」/ doc08 §比較の公平性）。
  # 既定 OFF（fairness-safe）。dev は明示せず OFF のまま。用途別の立て方:
  #   ・Mode A エンタメ回（学習 ON 可）: memory_enabled: true（comparison_run は false）
  #   ・Phase 4 比較 run（強制 OFF）: comparison_run: true（memory/skills を true にすると Bridge が起動 abort）
  # ※ これらは「運用意図」フラグ。実 Hermes の OFF は Hermes config 側が権威（doc13 §OFF 機構）。
  # memory_enabled: false
  # skills_enabled: false
  # comparison_run: false

# dev は Mode A（LLM単独）から始める
traffic_mode: none

# エンタメ回（Mode A）: 司令官を ~2分スパンで動かす。目的（WAREHOUSE_TASKS シード）を与えると Nav2 が
# 自走し、約2分ごとに司令官 LLM が再評価・再指示する（API コスト削減・思考ログ可読性も向上）。
# base の Mode C（mode_c_seconds: 5）は deep-merge で不変。
# トレードオフ（doc08:121 / :197）: Mode A は司令官 LLM が交通管理（デッドロック解消）も担うため、解消が
# 最大 ~2分遅れる。衝突回避は Emergency Guardian（50ms 反射）+ collision_monitor が独立に効くので
# 安全側は不変（.claude/rules/safety.md / doc12）。
cycle:
  mode_a_seconds: 120
