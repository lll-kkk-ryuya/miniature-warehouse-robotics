name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tools
        # pydantic + pyyaml: runtime deps of warehouse_interfaces (contract schemas
        # + config loader). See pyproject [project].dependencies. Needed for pytest.
        run: pip install ruff pytest pytest-cov "pydantic>=2" pyyaml
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Pytest (safety + unit)
        run: pytest

  langfuse-api-contract:
    name: Langfuse SDK API contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Langfuse contract deps
        run: pip install pytest "langfuse>=4.9,<5"
      - name: Pytest (Langfuse SDK surface)
        env:
          WAREHOUSE_RUN_LANGFUSE_API_CONTRACT: "1"
        run: pytest tests/unit/test_eval_sdk_langfuse_api_contract.py

  bridge-option-d:
    name: Bridge Option-D path (openai + langfuse SDK)
    runs-on: ubuntu-latest
    # Gates the bridge-leg Option-D tests that NO other job runs. The default
    # python-quality pytest installs only `ruff pytest pydantic pyyaml` — neither
    # `openai` nor `langfuse` — so tests/unit/test_hermes_client_option_d.py
    # `pytest.importorskip("openai")` / `importorskip("langfuse.openai")` (those
    # SDKs are lazy pip extras imported inside HermesClient.decide) SKIP entirely
    # there. The Option-D request shape, the `X-Hermes-Session-Id` header seeding,
    # and the fail-open drift-detect (_detect_session_drift, whitespace strip) thus
    # never ran in CI. Installing the SDK extras turns those importorskips into real
    # collection so the bridge leg is gated (cf. langfuse-api-contract above, and
    # firmware-safety which likewise runs host units no other job collects).
    # 正本: docs/architecture/20-dev-quality-and-testing.md:48 (CI job 一覧).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bridge Option-D deps (SDK extras + contract runtime)
        # ruff pytest "pydantic>=2" pyyaml: same runtime as python-quality (the
        # bridge imports warehouse_interfaces contract schemas + config loader).
        # openai + "langfuse>=4.9,<5": the lazy SDK extras the production decide()
        # path imports — pinned to the same langfuse range as langfuse-api-contract.
        run: pip install ruff pytest "pydantic>=2" pyyaml openai "langfuse>=4.9,<5"
      - name: Pytest (bridge Option-D path — openai/langfuse must collect, not skip)
        run: pytest tests/unit/test_hermes_client_option_d.py

  governance:
    name: Governance (contract label + track boundaries)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Contract label required for warehouse_interfaces changes
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          base="origin/${{ github.base_ref }}"
          changed="$(git diff --name-only "$base"...HEAD || true)"
          if echo "$changed" | grep -q '^ws/src/warehouse_interfaces/'; then
            if ! printf '%s' "$LABELS" | tr ',' '\n' | grep -qx 'contract'; then
              echo "::error::PR は ws/src/warehouse_interfaces/（凍結契約）を変更していますが 'contract' ラベルがありません。.claude/rules/parallel-workflow.md §4 を参照。"
              exit 1
            fi
          fi
      - name: No cross-track internal imports (warehouse_interfaces / description のみ共有)
        run: |
          python3 - <<'PY'
          import re, subprocess, sys
          # Track membership per doc16 §9 (branch→package table, 16-...:181-190). A package
          # may import packages in its OWN track (they are owned by one branch and ship
          # together); importing ANOTHER track's internal package is forbidden
          # (parallel-workflow.md §2.1 "他トラック内部"). Keep this map in sync with doc16 §9.
          # Shared packages are importable by all and are intentionally absent from any track:
          #   - warehouse_interfaces … 凍結契約（schemas / stores / paths / safety）
          #   - warehouse_description … ロボット記述の単一ソース（URDF / frame_id / footprint / 寸法）
          tracks = {
              "skeleton": {"warehouse_bringup"},
              "sim": {"warehouse_sim"},
              "safety-state": {"warehouse_safety", "warehouse_state"},
              "nav-traffic": {"warehouse_traffic", "warehouse_rmf_adapter"},
              "llm-bridge": {"warehouse_llm_bridge", "warehouse_mcp_server", "warehouse_nav2_bridge"},
              "wo": {"warehouse_orchestrator"},
              "teleop": {"warehouse_teleop"},
          }
          pkg_track = {p: t for t, ps in tracks.items() for p in ps}
          out = subprocess.run(["git", "ls-files", "ws/src/"],
                               capture_output=True, text=True).stdout.split()
          files = [f for f in out if f.endswith(".py")]
          bad = []
          for f in files:
              m = re.search(r"ws/src/(warehouse_\w+)/", f)
              if not m:
                  continue
              owner = m.group(1)
              owner_track = pkg_track.get(owner)  # None for shared pkgs (interfaces/description)
              try:
                  txt = open(f, encoding="utf-8").read()
              except OSError:
                  continue
              for p, ptrack in pkg_track.items():
                  if p == owner or ptrack == owner_track:
                      continue  # self / same-track import is allowed (doc16 §9)
                  if re.search(rf"(?m)^\s*(from|import)\s+{p}\b", txt):
                      bad.append(f"{f}: imports {p}（他トラック内部 / track={ptrack}）")
          if bad:
              print("::error::他トラック内部 import を検出（同一トラック内は可・共有は warehouse_interfaces / warehouse_description のみ・parallel-workflow.md §2.1 / doc16 §9）:")
              print("\n".join(bad))
              sys.exit(1)
          PY

  consistency:
    name: docs↔code consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ensure origin/main ref (STATUS SHA freshness check is best-effort)
        run: git fetch origin main || true
      - name: Run consistency checker
        # Pure stdlib (ast + regex + git) — no install. Binds doc claims to the frozen
        # single sources (warehouse_interfaces / description / config). ERROR fails the
        # build; WARN is surfaced only. 正本: docs/dev/04-consistency-system.md
        run: python3 scripts/check_consistency.py

  firmware-safety:
    name: Firmware host gates (R-26 clamp + kinematics + compile)
    runs-on: ubuntu-latest
    # Gates the firmware host units that NO other job runs: python-quality's pytest
    # collects ws/src Python only — never the C++ under firmware/test/. All three steps
    # are host-only (g++ + bundled shims, no PlatformIO/ESP32, run in seconds):
    #   1. R-26 Layer-0 velocity clamp (run_host_test.sh) — SAFETY anchor: without it,
    #      loosening the 0.3 m/s ceiling, the non-finite (NaN/±Inf)→stop fail-safe, or
    #      the negative-cap guard would not turn CI red (silent rot).
    #   2. Differential-drive kinematics (run_kinematics_test.sh) — a sign error in the
    #      skid-steer mix or a bad dead-reckon integration step would otherwise go
    #      unnoticed.
    #   3. Skeleton host compile (run_host_compile.sh) — a broken main.cpp stub
    #      signature (motor sink / publisher / clamp call path) would otherwise stay
    #      hidden until the on-target build.
    # Steps 2-3 are NOT R-26 safety units; they are colocated here so ALL pio-free
    # firmware host gates run in one job (firmware/README.md "テスト" §). The R-26 clamp
    # gate source (run_host_test.sh) is left unchanged ("クランプ gate は不変に保つ").
    # 正本: docs/architecture/20-dev-quality-and-testing.md:75
    # (Phase 0.5: 安全系ユニット R-26 を CI に追加),
    # docs/architecture/16-repository-and-conventions.md:218 (§11 安全機構は R-26 unit 必須),
    # .claude/rules/safety.md:4, docs/architecture/12-infrastructure-common.md:77 (≤0.3 m/s).
    steps:
      - uses: actions/checkout@v4
      - name: Layer-0 clamp R-26 (host)
        run: bash firmware/test/run_host_test.sh
      - name: Kinematics host unit (skid-steer mix + dead-reckon odom)
        run: bash firmware/test/run_kinematics_test.sh
      - name: Skeleton host compile (main.cpp)
        run: bash firmware/test/run_host_compile.sh

  web-quality:
    name: Web console (eslint + tsc + next build)
    runs-on: ubuntu-latest
    # Gates web/console — the observability SPA (doc22 §15). NO other job checks it: the Python
    # jobs never touch TypeScript, so without this a broken eslint / type error / failed static
    # export would not turn CI red. Node is build-time only (doc22:340); the static export `out/`
    # is what warehouse_web_bridge serves. 正本: docs/architecture/20-dev-quality-and-testing.md:48.
    defaults:
      run:
        working-directory: web/console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/console/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Type-check (tsc --noEmit)
        run: npm run typecheck
      - name: Build (static export → out/)
        run: npm run build

  web-e2e:
    name: Playwright (web console E2E)
    runs-on: ubuntu-latest
    # Smoke E2E for web/console: builds the static export, serves it (playwright webServer), and
    # asserts /live and /runs render (the panels mount + the SPA boots) with NO gateway — the
    # idle/empty states. The runtime data path (WS) is exercised by live runs. doc22:304,:348.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build web/console (static export)
        working-directory: web/console
        run: npm ci && npm run build
      - name: Install e2e deps
        working-directory: web/e2e
        run: npm ci
      - name: Install Playwright chromium
        working-directory: web/e2e
        run: npx playwright install --with-deps chromium
      - name: Run Playwright (serves web/console/out via webServer)
        working-directory: web/e2e
        run: npx playwright test
