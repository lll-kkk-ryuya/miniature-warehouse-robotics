name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tools
        # pydantic + pyyaml: runtime deps of warehouse_interfaces (contract schemas
        # + config loader). See pyproject [project].dependencies. Needed for pytest.
        run: pip install ruff pytest pytest-cov "pydantic>=2" pyyaml
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Pytest (safety + unit)
        run: pytest

  governance:
    name: Governance (contract label + track boundaries)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Contract label required for warehouse_interfaces changes
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          base="origin/${{ github.base_ref }}"
          changed="$(git diff --name-only "$base"...HEAD || true)"
          if echo "$changed" | grep -q '^ws/src/warehouse_interfaces/'; then
            if ! printf '%s' "$LABELS" | tr ',' '\n' | grep -qx 'contract'; then
              echo "::error::PR は ws/src/warehouse_interfaces/（凍結契約）を変更していますが 'contract' ラベルがありません。.claude/rules/parallel-workflow.md §4 を参照。"
              exit 1
            fi
          fi
      - name: No cross-track internal imports (warehouse_interfaces / description のみ共有)
        run: |
          python3 - <<'PY'
          import re, subprocess, sys
          # 各トラック package。共有パッケージ（どのトラックも import 可）は本リストに含めない:
          #   - warehouse_interfaces … 凍結契約（schemas / stores / paths / safety, parallel-workflow §2.1）
          #   - warehouse_description … ロボット記述の単一ソース（URDF / frame_id / footprint / 寸法。
          #     sim / nav / bringup が同一を参照, doc16 §9 / parallel-workflow §2.1）
          pkgs = ["warehouse_safety", "warehouse_state", "warehouse_sim",
                  "warehouse_traffic", "warehouse_llm_bridge",
                  "warehouse_mcp_server", "warehouse_nav2_bridge", "warehouse_orchestrator",
                  "warehouse_bringup", "warehouse_teleop"]
          out = subprocess.run(["git", "ls-files", "ws/src/"],
                               capture_output=True, text=True).stdout.split()
          files = [f for f in out if f.endswith(".py")]
          bad = []
          for f in files:
              m = re.search(r"ws/src/(warehouse_\w+)/", f)
              if not m:
                  continue
              owner = m.group(1)
              try:
                  txt = open(f, encoding="utf-8").read()
              except OSError:
                  continue
              for p in pkgs:
                  if p == owner:
                      continue
                  if re.search(rf"(?m)^\s*(from|import)\s+{p}\b", txt):
                      bad.append(f"{f}: imports {p}（他トラック内部）")
          if bad:
              print("::error::他トラック内部 import を検出（共有は warehouse_interfaces / warehouse_description のみ・parallel-workflow.md §2.1）:")
              print("\n".join(bad))
              sys.exit(1)
          PY

  web-e2e:
    name: Playwright (web E2E)
    runs-on: ubuntu-latest
    # WO画面 / rmf-web は Phase 4 で実装。UIが存在するまで無効。
    # TODO(Phase 4): `if: false` を外し、web/** 変更時に実行する。
    if: false
    defaults:
      run:
        working-directory: web/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
