; ESP32 micro-ROS firmware for Yahboom MicroROS Car (×2: bot1/bot2)
; Build: pio run   |   Upload: pio run -t upload   |   Monitor: pio device monitor
; micro-ROS transport = WiFi UDP -> micro-ROS Agent on Jetson (doc02/doc03).
; NOTE: 実機到着後に board/ピン/通信を実値確定（doc17 Step 1）。雛形のため未検証。
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    https://github.com/micro-ROS/micro_ros_arduino.git   ; Jazzy 対応ブランチを実機時に固定

build_flags =
    -D BOT_ID=1            ; bot1=1 / bot2=2（ビルド時に切替）。namespace /bot{n}
    -D MAX_LINEAR_VELOCITY_MMPS=300   ; 0.3 m/s = 300 mm/s（safety.md Layer-0 上限）

; --- Host unit test env (no ESP32) — Layer-0 clamp R-26 -----------------------
; Runs firmware/test/test_clamp on the host. test_build_src=no keeps <Arduino.h>
; (src/main.cpp) out of the native build; test_filter excludes the shim folder.
; Host fallback when `pio` is absent: firmware/test/run_host_test.sh (g++ + shim).
[env:native]
platform = native
test_framework = unity
test_build_src = no
test_filter = test_clamp
build_flags =
    -D BOT_ID=1
    -D MAX_LINEAR_VELOCITY_MMPS=300
