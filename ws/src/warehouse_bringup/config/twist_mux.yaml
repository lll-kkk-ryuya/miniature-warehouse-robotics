# twist_mux priorities — CANONICAL home (doc16 §5, doc16:117; #40).
#
# Relocated verbatim from ws/src/warehouse_safety/config/twist_mux.yaml (#5/PR#39),
# whose TODO(nav-traffic) marker named this as the final home. Values are the
# FROZEN safety contract (doc15:389-395) and MUST NOT change on relocation: the
# Emergency Guardian (priority 100) must outrank Nav2 (priority 10) so a zero-Twist
# stop on /cmd_vel/emergency cannot be overwritten by Nav2 path-following (a
# last-writer-wins race on /cmd_vel, doc15).
#
# PER-ROBOT: nav2_bringup.launch.py launches ONE twist_mux instance per bot inside
# namespace /bot{n}. Topic names are RELATIVE (no leading "/") so they resolve to
# /bot{n}/cmd_vel/emergency and /bot{n}/cmd_vel/nav2; the muxed output goes to
# /bot{n}/cmd_vel (the topic the sim ros_gz_bridge + real base consume). This one
# file is therefore reusable for bot1 and bot2.
#
# Producers: Emergency Guardian -> /bot{n}/cmd_vel/emergency (warehouse_safety);
# Nav2 controller_server AND behavior_server (recoveries) -> /bot{n}/cmd_vel/nav2
# (both remapped in nav2_bringup.launch.py — every Nav2 velocity producer must
# enter via this prio-10 input, never write /bot{n}/cmd_vel directly).
#
# NODE-NAME KEY = "/**" (NOT "twist_mux"): this file is loaded by a twist_mux node
# launched INSIDE namespace /bot{n} (nav2_bringup.launch.py:167-178), whose fully
# qualified name is /bot{n}/twist_mux. A bare "twist_mux:" key only matches a node in
# the ROOT namespace (/twist_mux), so under the per-bot namespace the params silently
# DO NOT load — twist_mux then comes up with NO topics, never publishes /bot{n}/cmd_vel,
# and the Emergency prio-100 override (R-26) is dead. "/**" matches the node in ANY
# namespace, so the FROZEN values below apply unchanged to both bot1 and bot2.
# Found+fixed in the #67 2-bot E2E gate (bare key -> params unset & bot does not move);
# the priorities/timeouts/topics are the same frozen safety contract (doc15:389-395, #40).
"/**":
  ros__parameters:
    # use_stamped MUST be false: every velocity hop in this stack is plain
    # geometry_msgs/Twist — Nav2 controller_server enable_stamped_cmd_vel:false
    # (nav2_params.yaml:85), the Emergency Guardian, and the gz bridge (gz.msgs.Twist).
    # twist_mux's Jazzy default is true (TwistStamped); leaving it unset makes twist_mux
    # subscribe/publish TwistStamped and silently forward NOTHING (type mismatch) -> no
    # /bot{n}/cmd_vel, the robot never moves, and the Emergency prio-100 override (R-26)
    # is dead. Found in the #67 E2E gate (live: handlers subscribe but produce no muxed
    # output until use_stamped:false). Not a priority/timeout value -> frozen contract intact.
    use_stamped: false
    topics:
      emergency:
        topic: cmd_vel/emergency
        timeout: 0.5
        priority: 100
      nav2:
        topic: cmd_vel/nav2
        timeout: 0.5
        priority: 10
