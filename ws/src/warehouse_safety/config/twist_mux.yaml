# twist_mux priorities (doc15:383-399). The Emergency Guardian outranks Nav2 so a
# zero-Twist stop on /cmd_vel/emergency cannot be overwritten by Nav2 path-following
# (last-writer-wins race on /cmd_vel, doc15).
#
# PER-ROBOT: launch ONE twist_mux instance per bot inside namespace /bot{n}. Topic
# names are RELATIVE (no leading "/") so they resolve to /bot{n}/cmd_vel/emergency
# and /bot{n}/cmd_vel/nav2; the muxed output goes to /bot{n}/cmd_vel. This one file
# is therefore reusable for bot1 and bot2.
#
# TODO(nav-traffic owner): the canonical FINAL home is
# warehouse_bringup/config/twist_mux.yaml (doc16 §5). warehouse_bringup has no
# config/ dir yet and is outside this track's edit boundary, so this lands
# package-local for now; the relocation + per-bot twist_mux nodes in bringup.launch.py
# are tracked by a GitHub issue to the nav-traffic owner.
twist_mux:
  ros__parameters:
    topics:
      emergency:
        topic: cmd_vel/emergency
        timeout: 0.5
        priority: 100
      nav2:
        topic: cmd_vel/nav2
        timeout: 0.5
        priority: 10
