approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"
project_doc_fallback_filenames = ["CLAUDE.md"]
project_doc_max_bytes = 65536

[features]
hooks = true
memories = false
multi_agent = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800
