# Dedicated, LEAN Hermes gateway for Mode X-ER (Gemini Robotics-ER transport).
#
# Purpose: route the ER text+image leg through a Hermes OpenAI-compatible API server
# (uniform transport + optional Langfuse observability) while stripping the agent loop so
# latency/overhead is minimal. The audio leg does NOT use this: Hermes /v1/chat/completions rejects
# input_audio content parts with HTTP 400 unsupported_content_type (PROBE-2, measured 2026-06-27);
# audio goes DIRECT to ER. See docs/mode-x-er/06-unfrozen-contract-resolutions.md §5.
#
# This is applied to a SEPARATE HERMES_HOME (deploy/dev/run-er-hermes.sh) — it NEVER touches
# the personal ~/.hermes (the user's openai-codex daily driver, memory ON).
#
# Why each key (verified 2026-06-26 against Hermes v0.15.1, file:line in the Hermes install):
# - model.provider "google" is the native Gemini provider (uses GOOGLE_API_KEY/GEMINI_API_KEY);
#   the API server ignores the request "model" field and uses this single server-side model.
# - platform_toolsets.api_server: [] — an EXPLICIT empty list yields ZERO tools (a None/unset
#   value falls back to the 35-tool default). No tools => no tool-loop, and the skills catalog +
#   memory/skills guidance drop out (they are gated on tools being present). This removes the
#   bulk of the ~20k-token agent overhead observed when running ER through the full agent.
# - memory off — no MEMORY.md / USER.md snapshot blocks; also required for fair LLM comparison.
# - agent.* guidance off — drops tool-use / task-completion / environment-probe prompt blocks.
#
# It is still a normal /v1/chat/completions endpoint, so the L3 handoff is unchanged (it already
# tolerates the ```json fence the agent formats its answer with).

model:
  default: "gemini-robotics-er-1.6-preview"
  provider: "google" # native Gemini provider; key from GOOGLE_API_KEY/GEMINI_API_KEY in .env

# Strip the agent loop -> near-thin transport (no raw/proxy mode exists; this is the lean path).
platform_toolsets:
  api_server: [] # explicit empty list = zero tools (NOT unset, which defaults to 35 tools)

memory:
  memory_enabled: false
  user_profile_enabled: false

agent:
  tool_use_enforcement: false
  task_completion_guidance: false
  environment_probe: false
  disabled_toolsets: []

# Observability is OUT-OF-BAND and fail-open. The built-in Langfuse plugin is ENABLED below, but it
# is OPT-IN scaffolding for the HLF-G0 / Option-D trace-owner probe — NOT the shipped default trace
# owner. It is consumed ONLY by hlf-g0-langfuse/run-er-gateway-langfuse.sh (which supplies langfuse
# via pip --target + PYTHONPATH and enables the plugin against the isolated home). The base launcher
# run-er-gateway.sh does NOT put langfuse on PYTHONPATH, so there the plugin FAILS OPEN (no traces,
# no crash). Set HERMES_LANGFUSE_PUBLIC_KEY / _SECRET_KEY / _BASE_URL in .env for a meaningful probe.
#
# SHIPPED DEFAULT trace owner stays Bridge-owned (langfuse.openai wrapper in the LLM Bridge), per
# merged docs/mode-x-er/06-unfrozen-contract-resolutions.md:9 and docs/productization/02-l4-robotics-
# bridge-box.md:179. Turning this plugin ON for observation is NOT the same as the Bridge-wrapper
# removal (Pattern B) — the latter is gated on live HLF-G0/G5 PASS (hlf-g0-langfuse/WRAPPER-REMOVAL-
# PLAN.md). eval_sdk still owns outcome scores either way (README-hlf-g0.md).
#
# EVIDENCE for "plugin-owned trace works" (do not over/under-claim — see hlf-g0-langfuse/RESULT.md):
#   2026-06-27 LIVE-OBSERVED (#360 spike, via run-er-gateway-langfuse.sh): with the input_audio fork
#   applied the audio-ER call DOES traverse this gateway, and the plugin lands a trace at the
#   deterministic Option-D seed create_trace_id(seed="H::H") (observed trace d1477eef..,
#   spike/langfuse-plugin-d/verify_d_audio.py PASS). NOT yet verified (human-gate): this package's
#   own literal HLF-G0 probe (inbound trace_id honor; static prediction = stock FAIL) and the full
#   #6 scorer-leg end-to-end join. Without the fork, audio bypasses Hermes entirely and only the
#   Bridge-owned trace covers it.
# IMPORTANT: keep this as a REAL plugins.enabled key, NOT only a comment — an earlier comment-only
# mention false-matched the launcher's enable check, so the plugin was never loaded (root cause fix).
# Removing it would re-break Option D (plugin minted no trace) — keep it; the fence is the comment
# above, not deletion.
plugins:
  enabled:
    - observability/langfuse
